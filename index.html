// --- Storage (localStorage + Firestore) ---
const WORKOUTS_COLLECTION = "workouts";

function loadWorkouts() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; } catch { return []; }
}
function saveWorkoutsLocal(w) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); } catch {}
}

// Firestore helpers (user-scoped)
function getUserCollection() {
  const user = auth && auth.currentUser;
  if (!db || !user) return null;
  return db.collection("users").doc(user.uid).collection("workouts");
}

async function loadWorkoutsFromFirestore() {
  const col = getUserCollection();
  if (!col) return null;
  try {
    const snapshot = await col.get();
    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  } catch (e) { console.error("Firestore load error:", e); return null; }
}

async function addWorkoutToFirestore(workout) {
  const col = getUserCollection();
  if (!col) return;
  try {
    await col.doc(workout.id).set(workout);
  } catch (e) { console.error("Firestore add error:", e); }
}

async function updateWorkoutInFirestore(workout) {
  const col = getUserCollection();
  if (!col) return;
  try {
    await col.doc(workout.id).set(workout);
  } catch (e) { console.error("Firestore update error:", e); }
}

async function deleteWorkoutFromFirestore(id) {
  const col = getUserCollection();
  if (!col) return;
  try {
    await col.doc(id).delete();
  } catch (e) { console.error("Firestore delete error:", e); }
}

// ======================== CALENDAR ========================
function CalendarView({ month, year, setMonth, setYear, workoutsByDate, selectedDate, setSelectedDate, onEdit, onDelete }) {
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = fmt(new Date());
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const prev = () => { if (month === 0) { setMonth(11); setYear(year-1); } else setMonth(month-1); };
  const next = () => { if (month === 11) { setMonth(0); setYear(year+1); } else setMonth(month+1); };

  return (
    <div style={{ padding: "0 20px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
        <button onClick={prev} style={iconBtnStyle}>{Icons.chevLeft}</button>
        <span style={{ fontSize: 17, fontWeight: 600 }}>{monthNames[month]} {year}</span>
        <button onClick={next} style={iconBtnStyle}>{Icons.chevRight}</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 4 }}>
        {dayLabels.map(d => <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 600, color: C.textDim, padding: "4px 0", textTransform: "uppercase", letterSpacing: 1 }}>{d}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
        {cells.map((d, i) => {
          if (d === null) return <div key={`e${i}`} />;
          const dateStr = fmt(new Date(year, month, d));
          const ws = workoutsByDate[dateStr] || [];
          const isToday = dateStr === today;
          const isSelected = dateStr === selectedDate;
          const hasLift = ws.some(w => w.type === "lift");
          const hasWalk = ws.some(w => w.type === "walk");
          return (
            <button key={dateStr} onClick={() => setSelectedDate(isSelected ? null : dateStr)}
              style={{
                background: isSelected ? C.surface2 : "transparent",
                border: isToday ? `1.5px solid ${C.accent}` : `1px solid ${isSelected ? C.border : "transparent"}`,
                borderRadius: 10, padding: "6px 2px 4px", cursor: "pointer", color: C.text,
                display: "flex", flexDirection: "column", alignItems: "center", minHeight: 48, transition: "all .15s",
              }}>
              <span style={{ fontSize: 13, fontWeight: isToday ? 700 : 500, color: isToday ? C.accent : C.text }}>{d}</span>
              <div style={{ display: "flex", gap: 3, marginTop: 3 }}>
                {hasLift && <span style={{ width: 6, height: 6, borderRadius: 6, background: C.accent }} />}
                {hasWalk && <span style={{ width: 6, height: 6, borderRadius: 6, background: C.walk }} />}
              </div>
            </button>
          );
        })}
      </div>
      {selectedDate && (
        <div style={{ marginTop: 20 }}>
          <h3 style={{ fontSize: 15, fontWeight: 600, margin: "0 0 10px", color: C.textDim }}>
            {parseDate(selectedDate).toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}
          </h3>
          {(workoutsByDate[selectedDate] || []).length === 0 ? (
            <p style={{ color: C.textDim, fontSize: 13, fontStyle: "italic" }}>No workouts logged</p>
          ) : (
            (workoutsByDate[selectedDate] || []).map(w => <WorkoutCard key={w.id} w={w} onEdit={onEdit} onDelete={onDelete} />)
          )}
        </div>
      )}
    </div>
  );
}

// ======================== STATS ========================
function StatsView({ workouts }) {
  const stats = useMemo(() => {
    const total = workouts.length;
    const lifts = workouts.filter(w => w.type === "lift");
    const walks = workouts.filter(w => w.type === "walk");
    const totalSets = lifts.reduce((s, w) => s + (w.sets || []).reduce((a, set) => a + 1, 0), 0);
    const totalReps = lifts.reduce((s, w) => s + (w.sets || []).reduce((a, set) => a + (parseInt(set.reps) || 0), 0), 0);
    const totalSteps = walks.reduce((s, w) => s + (parseInt(w.steps) || 0), 0);
    const totalMinutes = workouts.reduce((s, w) => s + (parseInt(w.duration) || 0), 0);

    const now = new Date();
    const weeks = [];
    for (let i = 7; i >= 0; i--) {
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - now.getDay() - i * 7);
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekStart.getDate() + 6);
      const count = workouts.filter(w => {
        const d = parseDate(w.date);
        return d >= weekStart && d <= weekEnd;
      }).length;
      weeks.push({ label: `W${8-i}`, count });
    }

    const liftCounts = {};
    lifts.forEach(w => { liftCounts[w.exercise] = (liftCounts[w.exercise] || 0) + 1; });
    const topLifts = Object.entries(liftCounts).sort((a,b) => b[1]-a[1]).slice(0,5);

    return { total, lifts: lifts.length, walks: walks.length, totalSets, totalReps, totalSteps, totalMinutes, weeks, topLifts };
  }, [workouts]);

  const maxWeek = Math.max(...stats.weeks.map(w => w.count), 1);

  return (
    <div style={{ padding: "0 20px" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
        <StatCard label="Total Workouts" value={stats.total} color={C.accent} />
        <StatCard label="Lifting Sessions" value={stats.lifts} color={C.accent} />
        <StatCard label="Walking Sessions" value={stats.walks} color={C.walk} />
        <StatCard label="Total Minutes" value={stats.totalMinutes} color={C.textDim} />
        <StatCard label="Total Sets" value={stats.totalSets} color={C.accent} />
        <StatCard label="Total Reps" value={stats.totalReps.toLocaleString()} color={C.accent} />
        <StatCard label="Total Steps" value={stats.totalSteps.toLocaleString()} color={C.walk} />
      </div>

      <div style={{ background: C.surface, borderRadius: 14, padding: 20, border: `1px solid ${C.border}`, marginBottom: 16 }}>
        <h3 style={{ fontSize: 14, fontWeight: 600, margin: "0 0 16px", color: C.textDim, textTransform: "uppercase", letterSpacing: 1 }}>Weekly Activity</h3>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 120 }}>
          {stats.weeks.map((w, i) => (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 11, fontFamily: fontMono, color: C.textDim }}>{w.count}</span>
              <div style={{ width: "100%", height: `${Math.max((w.count / maxWeek) * 90, 4)}px`, background: w.count > 0 ? C.accent : C.surface2, borderRadius: 4, transition: "height .3s" }} />
              <span style={{ fontSize: 10, color: C.textDim }}>{w.label}</span>
            </div>
          ))}
        </div>
      </div>

      {stats.topLifts.length > 0 && (
        <div style={{ background: C.surface, borderRadius: 14, padding: 20, border: `1px solid ${C.border}` }}>
          <h3 style={{ fontSize: 14, fontWeight: 600, margin: "0 0 14px", color: C.textDim, textTransform: "uppercase", letterSpacing: 1 }}>Top Exercises</h3>
          {stats.topLifts.map(([name, count], i) => (
            <div key={name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: i < stats.topLifts.length - 1 ? `1px solid ${C.border}` : "none" }}>
              <span style={{ fontSize: 14, fontWeight: 500 }}>{name}</span>
              <span style={{ fontSize: 13, fontFamily: fontMono, color: C.accent }}>{count}x</span>
            </div>
          ))}
        </div>
      )}

      {workouts.length === 0 && <p style={{ color: C.textDim, textAlign: "center", marginTop: 40, fontSize: 14 }}>Log some workouts to see your stats!</p>}
    </div>
  );
}

function StatCard({ label, value, color }) {

  const sorted = useMemo(() => [...workouts].sort((a, b) => b.date.localeCompare(a.date) || (b.time || "").localeCompare(a.time || "")), [workouts]);
  return (
    <div style={{ padding: "0 20px" }}>
      {sorted.length === 0 && <p style={{ color: C.textDim, textAlign: "center", marginTop: 40, fontSize: 14 }}>No workouts yet. Tap "Log Workout" to get started!</p>}
      {sorted.map(w => <WorkoutCard key={w.id} w={w} onEdit={onEdit} onDelete={onDelete} showDate />)}
    </div>
  );
}

// ======================== FORM ========================
function WorkoutForm({ onClose, onSave, initial }) {
  const isEdit = initial && initial.id;
  const [type, setType] = useState(initial?.type || "lift");
  const [exercise, setExercise] = useState(initial?.exercise || "");
  const [date, setDate] = useState(initial?.date || fmt(new Date()));
  const [time, setTime] = useState(initial?.time || "");
  const [duration, setDuration] = useState(initial?.duration || "");
  const [steps, setSteps] = useState(initial?.steps || "");
  const [sets, setSets] = useState(initial?.sets || [{ reps: "", weight: "" }]);
  const [showPresets, setShowPresets] = useState(false);

  const addSet = () => setSets(s => [...s, { reps: "", weight: "" }]);
  const removeSet = (i) => setSets(s => s.filter((_, j) => j !== i));
  const updateSet = (i, field, val) => setSets(s => s.map((x, j) => j === i ? { ...x, [field]: val } : x));

  const handleSave = () => {
    const base = { date, time, duration, type };
    if (type === "lift") {
      if (!exercise.trim()) return;
      onSave({ ...base, exercise: exercise.trim(), sets, ...(isEdit ? { id: initial.id } : {}) });
    } else {
      onSave({ ...base, steps, ...(isEdit ? { id: initial.id } : {}) });
    }
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", backdropFilter: "blur(6px)", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
      onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background: C.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 520, maxHeight: "88vh", overflow: "auto", padding: "24px 20px 32px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h2 style={{ fontSize: 20, fontWeight: 700, margin: 0 }}>{isEdit ? "Edit" : "Log"} Workout</h2>
          <button onClick={onClose} style={{ ...iconBtnStyle, color: C.textDim }}>{Icons.x}</button>
        </div>

        <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
          {[["lift","Lifting",Icons.dumbbell, C.accent],["walk","Walking",Icons.walk, C.walk]].map(([k,label,icon,color]) => (
            <button key={k} onClick={() => setType(k)} style={{
              flex: 1, padding: "12px", borderRadius: 12, border: `1.5px solid ${type===k ? color : C.border}`,
              background: type===k ? (k==="lift" ? C.accentDim : C.walkDim) : "transparent",
              color: type===k ? color : C.textDim, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, fontSize: 14, fontWeight: 600, fontFamily: font,
            }}>
              {icon} {label}
            </button>
          ))}
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 16 }}>
          <label style={labelStyle}>
            Date
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle} />
          </label>
          <label style={labelStyle}>
            Time
            <input type="time" value={time} onChange={e => setTime(e.target.value)} style={inputStyle} />
          </label>
          <label style={labelStyle}>
            Minutes
            <input type="number" value={duration} onChange={e => setDuration(e.target.value)} placeholder="0" style={inputStyle} />
          </label>
        </div>

        {type === "lift" ? (
          <>
            <label style={{ ...labelStyle, marginBottom: 8, position: "relative" }}>
              Exercise
              <div style={{ display: "flex", gap: 8 }}>
                <input value={exercise} onChange={e => setExercise(e.target.value)} placeholder="e.g. Bench Press" style={{ ...inputStyle, flex: 1 }} />
                <button onClick={() => setShowPresets(!showPresets)} style={{ ...btnStyle, background: C.surface2, color: C.textDim, padding: "8px 12px", fontSize: 12, whiteSpace: "nowrap" }}>
                  Presets
                </button>
              </div>
            </label>
            {showPresets && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
                {LIFT_PRESETS.map(p => (
                  <button key={p} onClick={() => { setExercise(p); setShowPresets(false); }}
                    style={{ ...btnStyle, background: C.surface2, color: C.text, padding: "6px 12px", fontSize: 12, borderRadius: 8 }}>
                    {p}
                  </button>
                ))}
              </div>
            )}

            <div style={{ marginTop: 8, marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: C.textDim, textTransform: "uppercase", letterSpacing: 0.5 }}>Sets</span>
                <button onClick={addSet} style={{ ...btnStyle, background: C.accentDim, color: C.accent, padding: "5px 12px", fontSize: 12 }}>
                  {Icons.plus} Add Set
                </button>
              </div>
              {sets.map((s, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "32px 1fr 1fr 32px", gap: 8, alignItems: "center", marginBottom: 8 }}>
                  <span style={{ fontSize: 13, fontFamily: fontMono, color: C.textDim, textAlign: "center" }}>{i+1}</span>
                  <input type="number" placeholder="Reps" value={s.reps} onChange={e => updateSet(i, "reps", e.target.value)} style={inputStyle} />
                  <input type="number" placeholder="Weight (lbs)" value={s.weight} onChange={e => updateSet(i, "weight", e.target.value)} style={inputStyle} />
                  {sets.length > 1 && (
                    <button onClick={() => removeSet(i)} style={{ ...iconBtnSmStyle, color: C.red }}>{Icons.x}</button>
                  )}
                </div>
              ))}
            </div>
          </>
        ) : (
          <label style={{ ...labelStyle, marginBottom: 16 }}>
            Steps
            <input type="number" value={steps} onChange={e => setSteps(e.target.value)} placeholder="e.g. 8000" style={inputStyle} />
          </label>
        )}

        <button onClick={handleSave} style={{ ...btnStyle, background: C.accent, color: "#0a0a0b", fontWeight: 700, width: "100%", padding: "14px", fontSize: 16, marginTop: 8 }}>
          {isEdit ? "Update" : "Save"} Workout
        </button>
      </div>
    </div>
  );
}

// ======================== AUTH SCREEN ========================
function AuthScreen({ onAuth }) {
  const [isSignUp, setIsSignUp] = useState(false);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    setError("");
    if (!email.trim() || !password.trim()) { setError("Please fill in all fields"); return; }
    setLoading(true);
    try {
      if (isSignUp) {
        await auth.createUserWithEmailAndPassword(email, password);
      } else {
        await auth.signInWithEmailAndPassword(email, password);
      }
    } catch (e) {
      const msg = e.code === "auth/user-not-found" ? "No account found with that email"
        : e.code === "auth/wrong-password" ? "Incorrect password"
        : e.code === "auth/invalid-credential" ? "Invalid email or password"
        : e.code === "auth/email-already-in-use" ? "An account with that email already exists"
        : e.code === "auth/weak-password" ? "Password must be at least 6 characters"
        : e.code === "auth/invalid-email" ? "Please enter a valid email"
        : e.message;
      setError(msg);
    }
    setLoading(false);
  };

  return (
    <div style={{ fontFamily: font, background: C.bg, color: C.text, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ width: "100%", maxWidth: 400 }}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 64, height: 64, borderRadius: 16, background: C.accentDim, marginBottom: 16 }}>
            {Icons.dumbbell}
          </div>
          <h1 style={{ fontSize: 28, fontWeight: 700, margin: "0 0 6px", letterSpacing: "-0.5px" }}>Workout Tracker</h1>
          <p style={{ color: C.textDim, fontSize: 14, margin: 0 }}>{isSignUp ? "Create an account to get started" : "Sign in to your account"}</p>
        </div>

        <div style={{ background: C.surface, borderRadius: 16, padding: 24, border: `1px solid ${C.border}` }}>
          <label style={{ ...labelStyle, marginBottom: 16 }}>
            Email
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" style={inputStyle}
              onKeyDown={e => e.key === "Enter" && handleSubmit()} />
          </label>
          <label style={{ ...labelStyle, marginBottom: 8 }}>
            Password
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" style={inputStyle}
              onKeyDown={e => e.key === "Enter" && handleSubmit()} />
          </label>

          {error && (
            <div style={{ background: C.redDim, border: `1px solid ${C.red}33`, borderRadius: 10, padding: "10px 14px", marginTop: 12, fontSize: 13, color: C.red }}>
              {error}
            </div>
          )}

          <button onClick={handleSubmit} disabled={loading} style={{
            ...btnStyle, background: C.accent, color: "#0a0a0b", fontWeight: 700, width: "100%", padding: "14px", fontSize: 16, marginTop: 20,
            opacity: loading ? 0.6 : 1,
          }}>
            {loading ? "Please wait..." : isSignUp ? "Create Account" : "Sign In"}
          </button>
        </div>

        <p style={{ textAlign: "center", marginTop: 20, fontSize: 14, color: C.textDim }}>
          {isSignUp ? "Already have an account?" : "Don't have an account?"}{" "}
          <span onClick={() => { setIsSignUp(!isSignUp); setError(""); }} style={{ color: C.accent, cursor: "pointer", fontWeight: 600 }}>
            {isSignUp ? "Sign In" : "Sign Up"}
          </span>
        </p>
      </div>
    </div>
  );
}

// ======================== MAIN APP ========================
function WorkoutTracker({ user }) {
  const [workouts, setWorkouts] = useState([]);
  const [view, setView] = useState("calendar");
  const [showForm, setShowForm] = useState(false);
  const [calMonth, setCalMonth] = useState(new Date().getMonth());
  const [calYear, setCalYear] = useState(new Date().getFullYear());
  const [selectedDate, setSelectedDate] = useState(null);
  const [editId, setEditId] = useState(null);

  // Load from Firestore on mount, fall back to localStorage
  useEffect(() => {
    (async () => {
      const firestoreData = await loadWorkoutsFromFirestore();
      if (firestoreData && firestoreData.length > 0) {
        setWorkouts(firestoreData);
        saveWorkoutsLocal(firestoreData);
      } else {
        const local = loadWorkouts();
        setWorkouts(local);
        // Sync any existing local data up to Firestore
        for (const w of local) {
          await addWorkoutToFirestore(w);
        }
      }
    })();
  }, []);

  // Save to localStorage whenever workouts change
  useEffect(() => {
    if (workouts.length > 0) saveWorkoutsLocal(workouts);
  }, [workouts]);

  const addWorkout = useCallback((w) => {
    const workout = { ...w, id: uid() };
    setWorkouts(prev => [...prev, workout]);
    addWorkoutToFirestore(workout);
    setShowForm(false);
  }, []);

  const updateWorkout = useCallback((w) => {
    setWorkouts(prev => prev.map(x => x.id === w.id ? w : x));
    updateWorkoutInFirestore(w);
    setShowForm(false);
    setEditId(null);
  }, []);

  const deleteWorkout = useCallback((id) => {
    setWorkouts(prev => prev.filter(x => x.id !== id));
    deleteWorkoutFromFirestore(id);
  }, []);

  const openEdit = useCallback((w) => {
    setEditId(w.id);
    setShowForm(true);
  }, []);

  const workoutsByDate = useMemo(() => {
    const m = {};
    workouts.forEach(w => { (m[w.date] = m[w.date] || []).push(w); });
    return m;
  }, [workouts]);

  return (
    <div style={{ fontFamily: font, background: C.bg, color: C.text, minHeight: "100vh", maxWidth: 520, margin: "0 auto", padding: "0 0 100px", position: "relative" }}>
      <div style={{ padding: "28px 20px 12px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 700, margin: 0, letterSpacing: "-0.5px" }}>Workout Tracker</h1>
          <p style={{ color: C.textDim, fontSize: 13, margin: "4px 0 0", fontWeight: 500 }}>{user.email}</p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <button onClick={() => { setEditId(null); setShowForm(true); }} style={{ ...btnStyle, background: C.accent, color: "#0a0a0b", fontWeight: 700, display: "flex", alignItems: "center", gap: 6, padding: "10px 18px" }}>
            {Icons.plus} Log
          </button>
          <button onClick={() => auth.signOut()} style={{ ...iconBtnStyle, color: C.textDim }} title="Sign out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>

      <div style={{ display: "flex", gap: 4, padding: "8px 20px 16px" }}>
        {[["calendar","Calendar",Icons.calendar],["stats","Stats",Icons.chart],["log","History",Icons.list]].map(([k,label,icon]) => (
          <button key={k} onClick={() => setView(k)} style={{ ...tabStyle, background: view===k ? C.surface2 : "transparent", color: view===k ? C.text : C.textDim, borderColor: view===k ? C.border : "transparent" }}>
            {icon} {label}
          </button>
        ))}
      </div>

      {view === "calendar" && (
        <CalendarView
          month={calMonth} year={calYear}
          setMonth={setCalMonth} setYear={setCalYear}
          workoutsByDate={workoutsByDate}
          selectedDate={selectedDate} setSelectedDate={setSelectedDate}
          onEdit={openEdit} onDelete={deleteWorkout}
        />
      )}
      {view === "stats" && <StatsView workouts={workouts} />}
      {view === "log" && <LogView workouts={workouts} onEdit={openEdit} onDelete={deleteWorkout} />}

      {showForm && (
        <WorkoutForm
          onClose={() => { setShowForm(false); setEditId(null); }}
          onSave={editId ? updateWorkout : addWorkout}
          initial={editId ? workouts.find(w => w.id === editId) : (selectedDate ? { date: selectedDate } : null)}
        />
      )}
    </div>
  );
}

// ======================== APP ROOT (auth gate) ========================
function App() {
  const [user, setUser] = useState(undefined); // undefined = loading, null = signed out

  useEffect(() => {
    if (!auth) { setUser(null); return; }
    const unsubscribe = auth.onAuthStateChanged((u) => {
      setUser(u);
    });
    return () => unsubscribe();
  }, []);

  if (user === undefined) {
    return (
      <div style={{ fontFamily: font, background: C.bg, color: C.textDim, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <p style={{ fontSize: 15 }}>Loading...</p>
      </div>
    );
  }

  if (!user) {
    return <AuthScreen />;
  }

  return <WorkoutTracker user={user} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
